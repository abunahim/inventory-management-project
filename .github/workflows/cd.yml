name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build jar
        working-directory: backend/inventory-management
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/inventory-management
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/inventory-management:latest
            ${{ secrets.DOCKER_USERNAME }}/inventory-management:${{ github.sha }}